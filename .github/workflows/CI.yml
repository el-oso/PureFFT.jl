name: CI
on:
  push:
    branches: [master]
    tags: ['*']
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ github.event_name }}
    runs-on: ubuntu-latest
    # The test suite uses TrimCheck (Julia 1.12 `Compiler` stdlib) and JET, so it runs on
    # stable (1.12.x); nightly is allowed to fail (compiler-internals churn).
    continue-on-error: ${{ matrix.version == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        version: ['1', 'nightly']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - name: StrictMode whole-surface audit (fast mode)
        if: matrix.version == '1'
        run: |
          julia --project=bench -e 'import Pkg; Pkg.instantiate()'
          julia --project=bench bench/strictmode_audit.jl
      - uses: julia-actions/julia-processcoverage@v1
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          format: lcov
          fail-on-error: false
