[deps]
AbstractFFTs = "621f4979-c628-5d54-868e-fcf4e3e8185c"
AllocCheck = "9b6a8646-10ed-4001-bbdc-1d2f46dfbb1a"
BenchmarkTools = "6e4b80f9-dd63-53aa-95a3-0cdb28fa8baf"
FFTW = "7a1cc6ca-52ef-59f5-83cd-3a7055c09341"
JET = "c3a54625-cd67-489e-a8e7-0a5a0ff4e31b"
LinearAlgebra = "37e2e46d-f89d-539d-b4ee-838fcccc9c8e"
ReTestItems = "817f1d60-ba6b-4fd5-9520-3cf149f6a823"
StrictMode = "0e98b4f4-d0e6-42ac-af0a-707c24852f32"
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"
TrimCheck = "f940d764-e397-4179-96e0-76ce55cfe39b"

# StrictMode is not registered — resolve it from its master branch (CI regenerates the gitignored
# Manifest, so the source must live here).
[sources]
StrictMode = {url = "https://github.com/el-oso/StrictMode.jl", rev = "master"}

# Enable StrictMode's checks for the test suite (committed here rather than in a separate
# LocalPreferences.toml so it travels with the project / CI runs them for real).
[preferences.StrictMode]
checks_enabled = true
analysis = "full"
fail_mode = "error"
